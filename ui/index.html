<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plexus — Codebase Connectome</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="theme-color" content="#0A0B0D">
  <meta name="description" content="Neural connectome engine: explore your codebase as a living brain.">
  <style>
    html { background-color: #0A0B0D; }
  </style>
</head>

<body>
  <div id="native-error-box"
    style="display:none; position:fixed; z-index:999999; inset:0; background:#0A0B0D; color:#E7E9EC; font-family:-apple-system,system-ui,sans-serif; overflow-y:auto; padding:48px 24px;">
    <div
      style="max-width:640px; margin:0 auto; background:#0F1012; border:1px solid rgba(255,255,255,0.07); border-radius:10px; border-top:2px solid #E5484D; padding:24px;">
      <div style="font-size:10px; letter-spacing:0.10em; text-transform:uppercase; color:#E5484D; font-weight:500;">
        System Fault</div>
      <p id="native-error-msg" style="font-size:14px; line-height:1.5; color:#E7E9EC; margin:12px 0;"></p>
      <pre id="native-error-stack"
        style="background:#141518; border:1px solid rgba(255,255,255,0.07); border-radius:8px; font-family:Menlo,monospace; font-size:11px; line-height:1.6; color:#9BA1A9; max-height:320px; overflow:auto; padding:12px; white-space:pre-wrap; word-wrap:break-word; margin:0 0 16px;"></pre>
      <div style="display:flex; gap:8px;">
        <button onclick="location.reload()"
          style="background:#E7E9EC; color:#0B0C0E; border:none; border-radius:6px; height:36px; padding:0 16px; font-size:13px; font-weight:600; cursor:pointer;">Reload</button>
        <button id="native-error-copy"
          style="background:transparent; color:#9BA1A9; border:1px solid rgba(255,255,255,0.07); border-radius:6px; height:36px; padding:0 16px; font-size:13px; cursor:pointer;">Copy
          report</button>
      </div>
    </div>
  </div>
  <script>
    (function () {
      var report = '';
      function showFault(msg, stack) {
        report += msg + '\n' + (stack || '') + '\n\n';
        document.getElementById('native-error-box').style.display = 'block';
        document.getElementById('native-error-msg').textContent = msg;
        document.getElementById('native-error-stack').textContent = report;
      }
      window.onerror = function (msg, url, line, col, error) {
        showFault(String(msg) + ' — ' + url + ':' + line + ':' + col, error && error.stack ? error.stack : '');
        return false;
      };
      window.addEventListener('unhandledrejection', function (event) {
        var r = event.reason;
        showFault('Unhandled promise rejection', r && r.stack ? r.stack : String(r));
      });
      document.addEventListener('DOMContentLoaded', function () {
        document.getElementById('native-error-copy').onclick = function () {
          if (navigator.clipboard) navigator.clipboard.writeText(report);
        };
      });
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
